<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframes</title>
</head>

<body>
    <h1>Exemplos de Incorporação de Iframes</h1>
    <h2>Incorporando um Vídeo do Youtube</h2>
    <!-- <iframe width="560" height="315" src="https://www.youtube.com/watch?v=RZOtkXPkxy8" title="Youtube Vídeo Player"
        frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyrospope; picture-in-picture"
        allowfullscreen></iframe> -->
    <iframe width="560" height="315" src="https://www.youtube.com/embed/RZOtkXPkxy8?si=UK7k7OTlXuCn-3CX"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <h2>Incorporando um Mapa do Google Maps</h2>
    <!-- <iframe
        src="https://www.google.com/maps?num=10&sca_esv=3a95cd185b11e83e&rlz=1C1VDKB_pt-PTBR1071BR1071&output=search&q=google+maps&source=lnms&fbs=ABfTbFVGaQeaqnsRPI5sOMG32KszjzN4g3YOmrBeWW1F-m8tPrm0LzTmrJy-SXAx4rR0rmp045JagWyUnIsSCNwYZrodagoVUX3Y1eYT8R9vLBKln45157aKJrkye45sQ_35YurFoUUmlnKaLBimOfxf0b6X6mFHqasVq-a9K0dL8Yv9OImIvuu8Ns30IF8T6umlV8WRoT7AVUqWme6qf0TQvdP2E-W-vA&entry=mc&ved=1t:200715&ictx=111"

        referrerpolicy="no-referrer-when-downgrade"></iframe>
    <h2>Incorporando uma Página web Externa</h2>
    <iframe src="https://ge.globo.com/" width="800" height="600" frameborder="0" allowfullscreen></iframe>
</body>

</html>
