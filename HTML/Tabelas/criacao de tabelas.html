<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABELAS</title>
</head>

<body>
    <h1>Exemplo de Criação de Tabelas</h1>
    <table border="1">
        <caption>Tabela de Vendas Anuais</caption>
        <thead>
            <tr>
                <th>Ano</th>
                <th>Vendas (em milhões)</th>
                <th>Lucro (em milhões)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>2024</td>
                <td>150</td>
                <td>5</td>
            </tr>
            <tr>
                <td>2023</td>
                <td>250</td>
                <td>20</td>
            </tr>
            <tr>
                <td>2022</td>
                <td>750</td>
                <td>50</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Total Vendas</td>
                <td>600</td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
