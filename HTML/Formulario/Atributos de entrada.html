<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>atributos</title>
</head>

<body>
    <h1>Formulário de Inscrição</h1>
    <form action="submit_form.php" method="POST">
        <label for="nome">Nome:</label>
        <input type="text" name="nome" id="nome" placeholder="Digitie seu nome" required>
        <br><br>
        <label for="email">E-mail:</label>
        <input type="email" name="email" id="email">
        <br><br>
        <label for="senha">Senha:</label>
        <input type="password" name="senha" id="senha">
        <br><br>
        <label for="idade">Idade:</label>
        <input type="number" name="idade" id="idade" placeholder="Digite sua idade" value="18">
        <br><br>
        <label for="dataNascimento">Data de Nascimento:</label>
        <input type="date" name="dataNascimento" id="dataNascimento" value="2000-01-01">
        <br><br>
        <label for="termos">Aceito os termos e confições:</label>
        <input type="checkbox" name="termos" id="termos">
        <br><br>
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>
</body>

</html>
