<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Form contato</title>
</head>

<body>
    <h1>Formulário de Contato</h1>
    <form action="processar_formulario.php" method="POST">
        <fieldset>
            <legend>Informações Pessoais</legend>
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome">
            <label for="email">E-mail:</label>
            <input type="email" name="email" id="email">
            <label for="mensagem">Mensagem</label>
            <textarea name="mensagem" id="mensagem" rows="4" required></textarea>
        </fieldset>
        <fieldset>
            <legend>Preferências</legend>
            <label for="noticias">Deseja receber nossa newsletter?</label>
            <input type="checkbox" id="noticias" name="noticias" checked>
            <label for="setor">Setor de interesse:</label>
            <select name="setor" id="setor">
                <option value="vendas">Vendas</option>
                <option value="suporte">Suporte</option>
                <option value="geral">Geral</option>
            </select>
        </fieldset>
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>
</body>

</html>
