<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa Eletrônico</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h2>Caixa Eletrônico</h2>
        <div id="login-container">
            <input type="text" name="usuario" id="usuario" placeholder="Usuário">
            <input type="password" name="senha" id="senha" placeholder="Senha">
            <div class="botao-login-cadastro-container">
                <button onclick="login()">Entrar</button>
                <button onclick="registrar()">Registrar</button>
            </div>
        </div>

        <div id="atm-container" style="display: none;">
            <h3>Bem-vindo, <span id="nome-usuario">/span></h3>
            <p>Conta: <span id="conta"></span></p>
            <p>Saldo: R$ <span id="saldo"></span></p>
            <button onclick="exibirDeposito()">Depositar</button>
            <button onclick="exibirSaque()">Sacar</button>
            <button onclick="exibirHistorico()">Histórico de transações</button>
            <button onclick="logout()">Sair</button>
        </div>

        <div id="deposito-container" style="display: none;">
            <h3>Depósito</h3>
            <input type="number" name="" id="valor-deposito" placeholder="Valor a depositar">
            <button onclick="depositar()">Depositar</button>
            <button onclick="exibirCaixaEletronico()">Cancelar</button>
        </div>

        <div id="saque-container" style="display: none;">
            <h3>Saque</h3>
            <input type="number" name="" id="valor-saque" placeholder="Valor a sacar">
            <button onclick="sacar()">Sacar</button>
            <button onclick="exibirCaixaEletronico()">Cancelar</button>
        </div>

        <div id="historico-container" style="display: none;">
            <h3>Histórico de transações</h3>
            <textarea id="historico-text" rows="10" cols="40" readonly></textarea>
            <button onclick="exibirCaixaEletronico()">Voltar</button>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>

</html>
