<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar QR Code</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Gerador de QR Code</h1>
        <input type="text" name="" id="entradaTexto" placeholder="Digite o texto ou URL">
        <button id="botaoGerar">Gerar QR Code</button>
        <div id="qrcode"></div>
        <button id="botaoBaixar" style="display: none;">Baixar QR Code</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script src="scripts.js"></script>
</body>

</html>
