<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Gerador de Senhas Seguras</h1>
        <div class="opcoes">
            <label for="comprimento">Comprimento da Senha:</label>
            <input type="number" name="" id="comprimento" min="6" value="12"><br>
            <input type="checkbox" name="" id="incluir-maiusculas" checked>
            <label for="incluir-maiusculas">Incluir Letras Maiúsculas</label><br>
            <input type="checkbox" name="" id="incluir-especiais" checked>
            <label for="incluir-especiais">Incluir Caracteres Especiais</label><br>
            <input type="checkbox" name="" id="incluir-numeros" checked>
            <label for="incluir-numeros">Incluir Números</label><br>
            <button id="gerar">Gerar Senha</button>
        </div>
        <div id="senha" class="senha"></div>
    </div>

    <script src="scripts.js"></script>
</body>

</html>
