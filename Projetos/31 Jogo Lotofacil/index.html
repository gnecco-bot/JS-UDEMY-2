<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotofácil</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <img src="lotofacil.jpg" alt="Mega-Sena" class="cabecalho-imagem">
        </header>
        <h1>Conferidor da Lotofácil</h1>
        <button id="abrirModalCadastroBtn">Cadastrar Jogo</button>
        <button id="abrirModalSurpresinhaBtn">Surpresinha Jogo</button>
        <div id="modalCadastro" class="modal">
            <div class="modal-conteudo">
                <span class="fechar">&times;</span>
                <h2>Cadastrar Jogo</h2>
                <form id="formularioJogo">
                    <label for="quantidadeNumeros">Quantidade de Números</label>
                    <input type="number" id="quantidadeNumeros" min="15" max="20" value="15" required>
                    <div id="numerosCampos">

                    </div>
                    <button type="sumbit">Salvar Jogo</button>
                </form>
            </div>
        </div>

        <div id="modalSurpresinha" class="modal">
            <div class="modal-conteudo">
                <span class="fechar">&times;</span>
                <h2>Surpresinha</h2>
                <label for="quantidadeNumerosSurpresinha">Quantidade de Números:</label>
                <input type="number" name="" id="quantidadeNumerosSurpresinha" min="15" max="20" value="15" required>
                <p id="jogoSurpresinha"></p>
                <button id="salvarSurpresinhaBtn">Salvar Jogo</button>
            </div>
        </div>

        <div class="secao-conferir">
            <div class="conferir-linha">
                <label for="confereNum1">Número 1:</label>
                <input type="number" name="" id="confereNum1" min="1" max="25">
                <label for="confereNum2">Número 2:</label>
                <input type="number" name="" id="confereNum2" min="1" max="25">
                <label for="confereNum3">Número 3:</label>
                <input type="number" name="" id="confereNum3" min="1" max="25">
                <label for="confereNum4">Número 4:</label>
                <input type="number" name="" id="confereNum4" min="1" max="25">
                <label for="confereNum5">Número 5:</label>
                <input type="number" name="" id="confereNum5" min="1" max="25">
            </div>

            <div class="conferir-linha">
                <label for="confereNum6">Número 6:</label>
                <input type="number" name="" id="confereNum6" min="1" max="25">
                <label for="confereNum7">Número 7:</label>
                <input type="number" name="" id="confereNum7" min="1" max="25">
                <label for="confereNum8">Número 8:</label>
                <input type="number" name="" id="confereNum8" min="1" max="25">
                <label for="confereNum9">Número 9:</label>
                <input type="number" name="" id="confereNum9" min="1" max="25">
                <label for="confereNum10">Número 10:</label>
                <input type="number" name="" id="confereNum10" min="1" max="25">
            </div>

            <div class="conferir-linha">
                <label for="confereNum11">Número 11:</label>
                <input type="number" name="" id="confereNum11" min="1" max="25">
                <label for="confereNum12">Número 12:</label>
                <input type="number" name="" id="confereNum12" min="1" max="25">
                <label for="confereNum13">Número 13:</label>
                <input type="number" name="" id="confereNum13" min="1" max="25">
                <label for="confereNum14">Número 14:</label>
                <input type="number" name="" id="confereNum14" min="1" max="25">
                <label for="confereNum15">Número 15:</label>
                <input type="number" name="" id="confereNum15" min="1" max="25">
            </div>
        </div>
        <button id="botaoConferir">Conferir</button>

        <ul id="listaJogos"></ul>
    </div>


    <script src="scripts.js"></script>
</body>

</html>
