<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Exercício Gerador de Tabuada do 10</h1>
    </header>
    <div class="container">
        <h2>Insira o número para gerar a tabuada</h2>

        <div class="grupo-entrada">
            <label for="numero"><strong>Número:</strong></label>
            <input type="number" name="" id="numero" placeholder="Insira um número">
        </div>

        <button class="botao" onclick="gerarTabuada()">Gerar Tabuada</button>
        <div id="resultado" class="grupo-saida"></div>
    </div>
    <script src="scripts.js"></script>
</body>

</html>
