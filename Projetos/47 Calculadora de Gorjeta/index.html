<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Gorjeta</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="calculadora">
        <h1>Exercício Calculadora de Gorjeta</h1>
        <label for="valorConta">Valor da Gorjeta:</label>
        <input type="number" name="salarioAntigo" id="valorConta" placeholder="Informe o valor">
        <label for="aumento">Percentual da Gorjeta (%):</label>
        <input type="number" name="salarioNovo" id="aumento" placeholder="Informe aumento">
        <button onclick="calcularAumento()">Calcular</button>
        <div id="resultado"></div>
    </div>

    <script src="scripts.js"></script>
</body>

</html>
