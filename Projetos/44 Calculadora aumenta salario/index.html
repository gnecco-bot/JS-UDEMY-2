<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora aumenta salario</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="calculadora">
        <h1>Exercício Calculadora de Aumento de Salário</h1>
        <label for="salarioAntigo">Salário Antigo:</label>
        <input type="number" name="salarioAntigo" id="salarioAntigo" placeholder="Informe o Salário antigo">
        <label for="salarioNovo">Salário Novo:</label>
        <input type="number" name="salarioNovo" id="salarioNovo" placeholder="Informe o Salário novo">
        <button onclick="calcularAumento()">Calcular</button>
        <div id="resultado"></div>
    </div>

    <script src="scripts.js"></script>
</body>

</html>
