<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Tabela com FIltros de Seleção (DropDown)</h1>
    <button onclick="exportarParaExcel()">Exportar para Excel</button>
    <div id="info">
        <p>Total de Linhas: <span id="contadorLinhas">0</span></p>
        <p>Somatório de Salários: <span id="somaSalarios">R$ 0,00</span></p>
    </div>

    <table id="tabelaFuncionarios">
        <thead>
            <tr>
                <th>
                    Nome
                    <select name="" id="filtroNome" onchange="filtrarTabela()">
                        <option value="">Todos</option>
                    </select>
                </th>
                <th>
                    Departamento
                    <select name="" id="filtroDepartamento" onchange="filtrarTabela()">
                        <option value="">Todos</option>
                    </select>
                </th>
                <th>
                    Cargo
                    <select name="" id="filtroCargo" onchange="filtrarTabela()">
                        <option value="">Todos</option>
                    </select>
                </th>
                <th>
                    Salário
                    <select name="" id="filtroSalario" onchange="filtrarTabela()">
                        <option value="">Todos</option>
                    </select>
                </th>
                <th>
                    Tempo de Empresa (anos)
                    <select name="" id="filtroTempo" onchange="filtrarTabela()">
                        <option value="">Todos</option>
                    </select>
                </th>
            </tr>
        </thead>

        <tbody id="corpoTabela">

        </tbody>

    </table>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="scripts.js"></script>
</body>

</html>
