<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Frutas</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Projeto Parallax Horizontal - Frutas</h1>
        <nav>
            <ul>
                <li><a href="#macaa">Maçã</a></li>
                <li><a href="#banana">Banana</a></li>
                <li><a href="#laranja">Laranja</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <section class="parallax parallax1" id="maca">
            <div class="conteudo">
                <h2>Maça</h2>
                <p>A maçã é uma fruta deliciosa...</p>
            </div>
        </section>

        <section class="parallax parallax2" id="banana">
            <div class="conteudo">
                <h2>Banana</h2>
                <p>A banana é uma fruta deliciosa...</p>
            </div>
        </section>

        <section class="parallax parallax3" id="laranja">
            <div class="conteudo">
                <h2>Laranja</h2>
                <p>A laranja é uma fruta citrica...</p>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 Projeto Parallax. Todos os direitos reservados</p>
    </footer>

    <script src="scripts.js"></script>
</body>

</html>
