<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Tabela de Funcionários</h1>
    <button onclick="exportarParaExcel()">Exportar para Excel</button>
    <table id="tabelaFuncionarios">
        <thead>
            <tr>
                <th>Nome <input type="text" oninput="filtrarTabela()" id="filtroNome" placeholder="Filtar por Nome">
                </th>
                <th>Departamento <input type="text" oninput="filtrarTabela()" id="filtroDepartamento"
                        placeholder="Filtar por Departamento"></th>
                <th>Cargo <input type="text" oninput="filtrarTabela()" id="filtroCargo" placeholder="Filtar por Cargo">
                </th>
                <th>Salário <input type="text" oninput="filtrarTabela()" id="filtroSalario"
                        placeholder="Filtar por Salário"></th>
                <th>Tempo de Empresa (anos) <input type="text" oninput="filtrarTabela()" id="filtroTempo"
                        placeholder="Filtar por Tempo">
                </th>
            </tr>
        </thead>
        <tbody id="corpoTabela">

        </tbody>
    </table>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>

    <script src="scripts.js"></script>
</body>

</html>
