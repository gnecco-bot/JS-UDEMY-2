<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo css com seletores avançados</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
    <input type="text" placeholder="Digite Algo...">
    <input type="password" placeholder="Sua senha">
    <p title="dica">Passe o mouse aqui para ver a dica.</p>

    <ul>
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>
    </ul>

    <div class="texto">Este é um <span>exemplo</span> de uso pseudo-elementos.</div>

</body>

</html>
